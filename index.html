    <style>
        body {
            font-family: 'Noto Sans KR', 'Poppins', sans-serif;
            background-color: #fafcff;
            overflow-x: hidden;
        }

        /* 맑고 투명한 하늘빛 별자리 배경 */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #ffffff 0%, #f0f7ff 100%);
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: radial-gradient(circle, #3b82f6 0%, rgba(59, 130, 246, 0.2) 100%);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.6);
            opacity: 0.4;
            animation: twinkle var(--duration, 3s) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.2;
                transform: scale(0.7);
            }
            50% {
                opacity: 0.9;
                transform: scale(1.3);
            }
        }

        /* 둥글둥글하고 러블리한 카드 및 그림자 효과 */
        .portfolio-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid #e0efff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(13, 110, 253, 0.04);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .portfolio-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #93c5fd;
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.12);
        }

        /* 호버 시 확대 돋보기 오버레이 */
        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(59, 130, 246, 0.08);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .portfolio-card:hover .card-overlay {
            opacity: 1;
        }

        /* 귀여운 동글동글 푸른 톤 그라데이션 타이틀 텍스트 */
        .gradient-title {
            background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 부드러운 반응형 확대 모달 레이아웃 */
        .lightbox-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.93);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox-modal.show {
            display: flex;
            opacity: 1;
        }
    </style>

    <!-- 자바스크립트 로직 -->
    <script>
        // 1. 귀여운 파란 별 생성 로직
        const starsContainer = document.getElementById('stars');
        const totalStars = 100;

        for (let i = 0; i < totalStars; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            
            const size = Math.random() * 3.5 + 1.5;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            
            const duration = Math.random() * 4 + 2.5;
            star.style.setProperty('--duration', duration + 's');
            
            starsContainer.appendChild(star);
        }

        // 2. 고도화된 다중 확장자 시도 로직 (캐시를 무시하기 위한 랜덤 버전 추가)
        const formats = ['jpg', 'png', 'jpeg', 'PNG', 'JPG'];
        
        function handleImageError(imageElement, fileNum) {
            if (!imageElement.dataset.step) {
                imageElement.dataset.step = "0";
            }
            
            let currentStep = parseInt(imageElement.dataset.step);
            
            if (currentStep < formats.length) {
                const nextFormat = formats[currentStep];
                imageElement.dataset.step = (currentStep + 1).toString();
                
                const cacheBuster = "?v=" + new Date().getTime();
                imageElement.src = fileNum + "." + nextFormat + cacheBuster;
            } else {
                imageElement.onerror = null;
                imageElement.src = `https://placehold.co/600x450/e0efff/3b82f6?text=Portfolio+${fileNum}`;
            }
        }

        // 3. 라이트박스 (확대 보기 & 슬라이더 연동) 제어 변수 및 함수
        let currentIdx = 1;
        const totalProjects = 10;
        const modal = document.getElementById('lightbox-modal');
        const modalImg = document.getElementById('modal-img');
        const modalTitle = document.getElementById('modal-title');

        function openLightbox(num) {
            currentIdx = num;
            updateModalContent();
            modal.style.display = 'flex';
            setTimeout(() => {
                modal.classList.add('show');
            }, 10);
            document.body.style.overflow = 'hidden'; // 스크롤 차단
        }

        function closeLightbox() {
            modal.classList.remove('show');
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300);
            document.body.style.overflow = 'auto'; // 스크롤 환원
        }

        function updateModalContent() {
            // 그리드 카드에 현재 성공적으로 로드된 최신 이미지의 src 주소를 그대로 복사해 옵니다 (확장자 충돌 100% 방지)
            const sourceImg = document.getElementById(`portfolio-img-${currentIdx}`);
            if (sourceImg) {
                modalImg.src = sourceImg.src;
            } else {
                modalImg.src = `${currentIdx}.jpg`;
            }
            modalTitle.textContent = `${currentIdx.toString().padStart(2, '0')}번 디자인`;
        }

        function changeImage(direction) {
            currentIdx += direction;
            if (currentIdx > totalProjects) {
                currentIdx = 1;
            } else if (currentIdx < 1) {
                currentIdx = totalProjects;
            }
            updateModalContent();
        }

        // 키보드 방향키 및 ESC 단축키 바인딩
        document.addEventListener('keydown', (e) => {
            if (modal.classList.contains('show')) {
                if (e.key === 'ArrowRight') changeImage(1);
                if (e.key === 'ArrowLeft') changeImage(-1);
                if (e.key === 'Escape') closeModal();
            }
        });

        // 4. 귀여운 오르골 멜로디 재생 엔진 (Tone.js 활용)
        let isPlaying = false;
        let polySynth;
        let loopEvent;

        function initSynth() {
            if (!polySynth) {
                polySynth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: {
                        type: "sine"
                    },
                    envelope: {
                        attack: 0.08,
                        decay: 0.24,
                        sustain: 0.15,
                        release: 1.2
                    }
                }).toDestination();
                
                polySynth.volume.value = -16;

                const melody = [
                    "E5", "G5", "A5", "G5", "E5", "C5", "D5", "C5",
                    "E5", "E5", "G5", "G5", "A5", "C6", "A5", "G5",
                    "A5", "C6", "D6", "C6", "A5", "G5", "E5", "D5",
                    "C5", "D5", "E5", "G5", "D5", "E5", "C5", "C5"
                ];

                let noteIdx = 0;

                loopEvent = new Tone.Loop((time) => {
                    let currentNote = melody[noteIdx % melody.length];
                    polySynth.triggerAttackRelease(currentNote, "8n", time);
                    noteIdx++;
                }, "8n");
            }
        }

        async function toggleMelody() {
            await Tone.start();
            initSynth();

            const btnText = document.getElementById('music-text');
            const liveIndicator = document.getElementById('live-indicator');
            const btn = document.getElementById('music-btn');

            if (isPlaying) {
                Tone.Transport.stop();
                loopEvent.stop();
                isPlaying = false;
                btnText.textContent = "멜로디 켜기 ♪";
                liveIndicator.style.display = "none";
                btn.classList.remove('border-blue-500', 'bg-blue-50');
            } else {
                Tone.Transport.start();
                loopEvent.start(0);
                isPlaying = true;
                btnText.textContent = "멜로디 끄기 ♬";
                liveIndicator.style.display = "inline-flex";
                btn.classList.add('border-blue-500', 'bg-blue-50');
            }
        }
