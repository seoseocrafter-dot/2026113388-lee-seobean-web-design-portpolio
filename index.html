    <style>
        /* 1. 이미지 및 복사 도용 금지 강력한 CSS 조치 */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none; /* 드래그 및 복사 금지 */
            -webkit-touch-callout: none; /* 모바일 길게 누르기 이미지 저장 차단 */
        }

        body {
            font-family: 'Noto Sans KR', 'Poppins', sans-serif;
            background-color: #fafcff;
            overflow-x: hidden;
        }

        /* 맑고 투명한 하늘빛 배경 위 파란색 별자리 */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #ffffff 0%, #f0f7ff 100%);
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: radial-gradient(circle, #3b82f6 0%, rgba(59, 130, 246, 0.2) 100%);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.6);
            opacity: 0.4;
            animation: twinkle var(--duration, 3s) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.2;
                transform: scale(0.7);
            }
            50% {
                opacity: 0.9;
                transform: scale(1.3);
            }
        }

        /* 둥글둥글하고 러블리한 카드 및 그림자 효과 */
        .portfolio-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid #e0efff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(13, 110, 253, 0.04);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .portfolio-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #93c5fd;
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.12);
        }

        /* 호버 시 확대 돋보기 오버레이 */
        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(59, 130, 246, 0.08);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .portfolio-card:hover .card-overlay {
            opacity: 1;
        }

        /* 귀여운 동글동글 푸른 톤 그라데이션 타이틀 텍스트 */
        .gradient-title {
            background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 부드러운 반응형 확대 모달 레이아웃 */
        .lightbox-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.93);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox-modal.show {
            display: flex;
            opacity: 1;
        }

        /* 모달 이미지 저장 완전 방지를 위한 드래그 불가 가림막 */
        .img-guard {
            pointer-events: none;
            -webkit-user-drag: none;
        }
    </style>
</head>

    <script>
        // ==========================================
        // 1. 보안 설정: 우클릭, 드래그, 단축키 철저 차단
        // ==========================================
        
        // 1-1. 마우스 오른쪽 클릭 메뉴 원천 차단
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        // 1-2. 이미지 드래그 차단 (다운로드 방지)
        document.addEventListener('dragstart', (e) => {
            if (e.target.tagName === 'IMG' || e.target.classList.contains('img-guard')) {
                e.preventDefault();
            }
        });

        // 1-3. 개발자 도구 및 소스 복제용 단축키 차단 (F12, Ctrl+Shift+I, Ctrl+U, Ctrl+C, Ctrl+S)
        document.addEventListener('keydown', (e) => {
            // F12 차단
            if (e.key === 'F12') {
                e.preventDefault();
            }
            // Ctrl + Shift + I (크롬 개발자 도구)
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j')) {
                e.preventDefault();
            }
            // Ctrl + U (소스 코드 보기)
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) {
                e.preventDefault();
            }
            // Ctrl + S (페이지 저장)
            if (e.ctrlKey && (e.key === 'S' || e.key === 's')) {
                e.preventDefault();
            }
            // Ctrl + C, Ctrl + X, Ctrl + V 차단
            if (e.ctrlKey && (e.key === 'C' || e.key === 'c' || e.key === 'X' || e.key === 'x' || e.key === 'V' || e.key === 'v')) {
                e.preventDefault();
            }
        });

        // ==========================================
        // 2. 귀여운 파란 별 생성 로직
        // ==========================================
        const starsContainer = document.getElementById('stars');
        const totalStars = 100;

        for (let i = 0; i < totalStars; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            
            const size = Math.random() * 3.5 + 1.5;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            
            const duration = Math.random() * 4 + 2.5;
            star.style.setProperty('--duration', duration + 's');
            
            starsContainer.appendChild(star);
        }

        // ==========================================
        // 3. 다중 확장자 자동 매칭 및 캐시 방지 시스템
        // ==========================================
        const formats = ['jpg', 'png', 'jpeg', 'PNG', 'JPG'];
        
        function handleImageError(imageElement, fileNum) {
            if (!imageElement.dataset.step) {
                imageElement.dataset.step = "0";
            }
            
            let currentStep = parseInt(imageElement.dataset.step);
            
            if (currentStep < formats.length) {
                const nextFormat = formats[currentStep];
                imageElement.dataset.step = (currentStep + 1).toString();
                
                const cacheBuster = "?v=" + new Date().getTime();
                imageElement.src = fileNum + "." + nextFormat + cacheBuster;
            } else {
                imageElement.onerror = null;
                imageElement.src = `https://placehold.co/600x450/e0efff/3b82f6?text=Portfolio+${fileNum}`;
            }
        }

        // ==========================================
        // 4. 라이트박스 팝업 및 슬라이더 시스템
        // ==========================================
        let currentIdx = 1;
        const totalProjects = 10;
        const modal = document.getElementById('lightbox-modal');
        const modalImg = document.getElementById('modal-img');
        const modalTitle = document.getElementById('modal-title');

        function openLightbox(num) {
            currentIdx = num;
            updateModalContent();
            modal.style.display = 'flex';
            setTimeout(() => {
                modal.classList.add('show');
            }, 10);
            document.body.style.overflow = 'hidden'; 
        }

        function closeLightbox() {
            modal.classList.remove('show');
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300);
            document.body.style.overflow = 'auto'; 
        }

        function updateModalContent() {
            const sourceImg = document.getElementById(`portfolio-img-${currentIdx}`);
            if (sourceImg) {
                modalImg.src = sourceImg.src;
            } else {
                modalImg.src = `${currentIdx}.jpg`;
            }
            modalTitle.textContent = `${currentIdx.toString().padStart(2, '0')}번 디자인`;
        }

        function changeImage(direction) {
            currentIdx += direction;
            if (currentIdx > totalProjects) {
                currentIdx = 1;
            } else if (currentIdx < 1) {
                currentIdx = totalProjects;
            }
            updateModalContent();
        }

        // 키보드 내비게이션 연계
        document.addEventListener('keydown', (e) => {
            if (modal.classList.contains('show')) {
                if (e.key === 'ArrowRight') changeImage(1);
                if (e.key === 'ArrowLeft') changeImage(-1);
                if (e.key === 'Escape') closeLightbox();
            }
        });

        // ==========================================
        // 5. 정밀 조율된 전통 가야금(Gayageum) 사운드 엔진
        // ==========================================
        let isPlaying = false;
        let gayageumSynth;
        let loopEvent;

        function initSynth() {
            if (!gayageumSynth) {
                // 가야금 특유의 농현(진동 효과)을 위한 비브라토 연결
                const vibrato = new Tone.Vibrato({
                    frequency: 5.5, // 떨림의 주기
                    depth: 0.18      // 떨림의 너비 (농현 느낌)
                }).toDestination();

                // 가야금 발현악기 특유의 잔향과 현의 깊이감을 위한 딜레이 연결
                const delay = new Tone.FeedbackDelay({
                    delayTime: "4n.",
                    feedback: 0.15
                }).connect(vibrato);

                // 가야금의 따뜻하고 목가적인 줄 튕김을 모사하는 합성기 설계
                gayageumSynth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: {
                        type: "triangle" // 가야금 오동나무 울림통 소리를 내는 따뜻한 파형
                    },
                    envelope: {
                        attack: 0.008, // 현을 손가락으로 채는 빠르고 날카로운 순간
                        decay: 0.6,    // 현의 울림이 잦아드는 속도
                        sustain: 0.02, // 손가락을 뗀 뒤 미세하게 남는 줄의 떨림
                        release: 0.8
                    }
                }).connect(delay);
                
                // 가야금 독주 느낌을 주는 정밀한 볼륨 레벨 지정
                gayageumSynth.volume.value = -8;

                // 정통 한국 민요 "아리랑" 가야금 독주 음표 배치 (3/4 박자 세마치 장단 분위기)
                const arirangMelody = [
                    { note: "D4", duration: "4n" }, { note: "E4", duration: "8n" }, { note: "G4", duration: "2n" },
                    { note: "G4", duration: "4n" }, { note: "A4", duration: "8n" }, { note: "G4", duration: "4n" }, { note: "E4", duration: "8n" },
                    { note: "D4", duration: "4n" }, { note: "E4", duration: "8n" }, { note: "G4", duration: "2n" },
                    { note: "A4", duration: "4n" }, { note: "G4", duration: "8n" }, { note: "E4", duration: "2n" },

                    { note: "D4", duration: "4n" }, { note: "E4", duration: "8n" }, { note: "G4", duration: "2n" },
                    { note: "G4", duration: "4n" }, { note: "A4", duration: "8n" }, { note: "B4", duration: "4n" }, { note: "A4", duration: "8n" },
                    { note: "G4", duration: "4n" }, { note: "E4", duration: "8n" }, { note: "D4", duration: "2n" },
                    { note: "D4", duration: "4n" }, { note: "E4", duration: "8n" }, { note: "D4", duration: "2n" },

                    // 후렴구 진행
                    { note: "D5", duration: "4n" }, { note: "B4", duration: "8n" }, { note: "A4", duration: "2n" },
                    { note: "A4", duration: "4n" }, { note: "B4", duration: "8n" }, { note: "A4", duration: "4n" }, { note: "G4", duration: "8n" },
                    { note: "E4", duration: "4n" }, { note: "D4", duration: "8n" }, { note: "G4", duration: "2n" },
                    { note: "A4", duration: "4n" }, { note: "G4", duration: "8n" }, { note: "E4", duration: "2n" },

                    { note: "D4", duration: "4n" }, { note: "E4", duration: "8n" }, { note: "G4", duration: "2n" },
                    { note: "G4", duration: "4n" }, { note: "A4", duration: "8n" }, { note: "B4", duration: "4n" }, { note: "A4", duration: "8n" },
                    { note: "G4", duration: "4n" }, { note: "E4", duration: "8n" }, { note: "D4", duration: "2n" },
                    { note: "D4", duration: "4n" }, { note: "E4", duration: "8n" }, { note: "D4", duration: "2n" }
                ];

                let noteIdx = 0;

                // 8분음표 단위로 멜로디의 템포와 흐름 조절
                loopEvent = new Tone.Loop((time) => {
                    let currentItem = arirangMelody[noteIdx % arirangMelody.length];
                    
                    // 가야금 특유의 농현을 살리기 위한 미세한 피치 슬라이드 가미
                    gayageumSynth.triggerAttackRelease(currentItem.note, currentItem.duration, time);
                    noteIdx++;
                }, "4n");
            }
        }

        async function toggleMelody() {
            await Tone.start();
            initSynth();

            const btnText = document.getElementById('music-text');
            const liveIndicator = document.getElementById('live-indicator');
            const btn = document.getElementById('music-btn');

            if (isPlaying) {
                Tone.Transport.stop();
                loopEvent.stop();
                isPlaying = false;
                btnText.textContent = "가야금 켜기 ♫";
                liveIndicator.style.display = "none";
                btn.classList.remove('border-blue-500', 'bg-blue-50');
            } else {
                Tone.Transport.start();
                loopEvent.start(0);
                isPlaying = true;
                btnText.textContent = "가야금 끄기 ♬";
                liveIndicator.style.display = "inline-flex";
                btn.classList.add('border-blue-500', 'bg-blue-50');
            }
        }
    </script>
</body>
</html>
