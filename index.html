    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tone.js for Web Audio Synthesizer -->

    <style>
        body {
            font-family: 'Noto Sans KR', 'Poppins', sans-serif;
            background-color: #fafcff;
            overflow-x: hidden;
        }

        /* 맑고 투명한 하늘빛 별자리 배경 */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #ffffff 0%, #f0f7ff 100%);
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: radial-gradient(circle, #3b82f6 0%, rgba(59, 130, 246, 0.2) 100%);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.6);
            opacity: 0.4;
            animation: twinkle var(--duration, 3s) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.2;
                transform: scale(0.7);
            }
            50% {
                opacity: 0.9;
                transform: scale(1.3);
            }
        }

        /* 둥글둥글하고 러블리한 카드 및 그림자 효과 */
        .portfolio-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid #e0efff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(13, 110, 253, 0.04);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .portfolio-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #93c5fd;
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.12);
        }

        /* 귀여운 동글동글 푸른 톤 그라데이션 타이틀 텍스트 */
        .gradient-title {
            background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

    <!-- 하단 라이센스 푸터 -->

    <script>
        // 1. 귀여운 파란 별 생성 로직
        const starsContainer = document.getElementById('stars');
        const totalStars = 100;

        for (let i = 0; i < totalStars; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            
            // 귀여운 미세한 사이즈 조절
            const size = Math.random() * 3.5 + 1.5;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            
            // 랜덤 위치 분포
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            
            // 반짝임의 랜덤 템포 부여
            const duration = Math.random() * 4 + 2.5;
            star.style.setProperty('--duration', duration + 's');
            
            starsContainer.appendChild(star);
        }

        // 2. 확장자 누락 자동 우회 로직 (.jpg가 없으면 자동으로 .png로 대체로드 시도)
        function handleImageError(imageElement, fallbackSrc) {
            imageElement.onerror = null;
            imageElement.src = fallbackSrc;
        }

        // 3. 귀여운 오르골 멜로디 재생 엔진 (Tone.js 활용)
        let isPlaying = false;
        let polySynth;
        let loopEvent;

        function initSynth() {
            if (!polySynth) {
                // 부드럽고 귀여운 오르골 건반 소리를 내는 신디사이저 설정
                polySynth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: {
                        type: "sine" // 맑고 동글동글한 고유 사인파음
                    },
                    envelope: {
                        attack: 0.08,
                        decay: 0.24,
                        sustain: 0.15,
                        release: 1.2
                    }
                }).toDestination();
                
                // 귀에 거슬리지 않는 적절하고 귀여운 음량 조절 (-16dB)
                polySynth.volume.value = -16;

                // 통통 튀는 아기자기한 동요풍 멜로디 배열 (C Major pentatonic 기반)
                const melody = [
                    "E5", "G5", "A5", "G5", "E5", "C5", "D5", "C5",
                    "E5", "E5", "G5", "G5", "A5", "C6", "A5", "G5",
                    "A5", "C6", "D6", "C6", "A5", "G5", "E5", "D5",
                    "C5", "D5", "E5", "G5", "D5", "E5", "C5", "C5"
                ];

                let noteIdx = 0;

                // 일정한 박자로 귀엽게 연주하는 루프 이벤트 등록
                loopEvent = new Tone.Loop((time) => {
                    let currentNote = melody[noteIdx % melody.length];
                    
                    // 조금 더 인간적이고 무작위적인 아기자기함을 위한 미세 레이턴시
                    polySynth.triggerAttackRelease(currentNote, "8n", time);
                    noteIdx++;
                }, "8n");
            }
        }

        async function toggleMelody() {
            // 브라우저 정책상 사용자 상호작용 후 사운드가 허용되도록 동적 활성화
            await Tone.start();
            initSynth();

            const btnText = document.getElementById('music-text');
            const liveIndicator = document.getElementById('live-indicator');
            const btn = document.getElementById('music-btn');

            if (isPlaying) {
                Tone.Transport.stop();
                loopEvent.stop();
                isPlaying = false;
                btnText.textContent = "멜로디 켜기 ♪";
                liveIndicator.style.display = "none";
                btn.classList.remove('border-blue-500', 'bg-blue-50');
            } else {
                Tone.Transport.start();
                loopEvent.start(0);
                isPlaying = true;
                btnText.textContent = "멜로디 끄기 ♬";
                liveIndicator.style.display = "inline-flex";
                btn.classList.add('border-blue-500', 'bg-blue-50');
            }
        }
    </script>
